services:
  ad5x-monitor:
    image: python:3.12-slim
    working_dir: /app/backend
    volumes:
      - ./:/app
      - ../Settings export:/workspace-settings:ro
    environment:
      - AD5X_HOST=192.168.1.172
      - AD5X_PORT=8899
      - AD5X_SERVER_HOST=0.0.0.0
      - AD5X_SERVER_PORT=8000
      - AD5X_UPDATE_INTERVAL=2.0
      - AD5X_MESH_SOURCE=/workspace-settings/printer.txt
    command: /bin/sh -c "pip install -r requirements.txt && python main.py"
    ports:
      - "8000:8000"
    restart: unless-stopped
