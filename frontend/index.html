<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AD5X Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css" />
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>

  <header class="topbar">
    <h1>AD5X Safe Monitor</h1>
    <div class="status-chip" id="connState">connecting...</div>
  </header>

  <main class="grid">
    <section class="card">
      <h2>Температуры</h2>
      <div class="temp-grid">
        <div class="metric">
          <span>Сопло</span>
          <strong id="nozzleTemp">-</strong>
        </div>
        <div class="metric">
          <span>Стол</span>
          <strong id="bedTemp">-</strong>
        </div>
      </div>
      <canvas id="tempChart" height="120"></canvas>
    </section>

    <section class="card">
      <h2>Статус печати</h2>
      <div class="row"><span>Состояние</span><strong id="printState">-</strong></div>
      <div class="row"><span>Байты</span><strong id="printBytes">-</strong></div>
      <div class="row"><span>Слои</span><strong id="printLayer">-</strong></div>
      <div class="progress-wrap"><div id="printProgress" class="progress"></div></div>
    </section>

    <section class="card">
      <h2>Положение</h2>
      <div class="pos-grid">
        <div>X: <strong id="posX">-</strong></div>
        <div>Y: <strong id="posY">-</strong></div>
        <div>Z: <strong id="posZ">-</strong></div>
        <div>E: <strong id="posE">-</strong></div>
      </div>
      <p class="hint" id="m114Hint">M114 payload не подтвержден.</p>
    </section>

    <section class="card">
      <h2>Концевики</h2>
      <div class="endstops">
        <span id="xStop" class="dot">X</span>
        <span id="yStop" class="dot">Y</span>
        <span id="zStop" class="dot">Z</span>
      </div>
    </section>

    <section class="card card-wide">
      <div class="row-between">
        <h2>Карта стола</h2>
        <button id="refreshMeshBtn">Обновить mesh</button>
      </div>
      <div id="meshPlot" class="mesh"></div>
      <div class="mesh-stats" id="meshStats">Нет данных mesh.</div>
    </section>

    <section class="card card-wide">
      <h2>Последний ответ 8899</h2>
      <pre id="lastRaw" class="raw">-</pre>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
